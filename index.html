<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gra</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow-y: scroll;
    overflow-x: hidden;
}

body {
    background: #5b86cf;
    min-height: 10240px; /* np. 10 par */
}

:root {
    --tile-height: 512px;
}

.layer {
    position: absolute;
    left: 0;
    width: 100%;
    height: var(--tile-height);

    background-image: url("assets/game_bg_01_001.png");
    background-repeat: repeat-x;
    background-size: auto 100%;

    animation: scrollBg 10s linear infinite;
}

.flip {
    transform: scaleY(-1);
}

.l1 { top: 0px; }
.l2 { bottom: 512px; }

.l3 { bottom: 1024px; }
.l4 { bottom: 1536px; }

.l5 { bottom: 2048px; }
.l6 { bottom: 2560px; }

@keyframes scrollBg {
    from {
        background-position-x: 0;
    }
    to {
        background-position-x: -512px;
    }
}
</style>

</head>
<body>

<div class="layer" style="top:0px"></div>
<div class="layer flip" style="top:512px"></div>

<div class="layer" style="top:1024px"></div>
<div class="layer flip" style="top:1536px"></div>

<div class="layer" style="top:2048px"></div>
<div class="layer flip" style="top:2560px"></div>

<div class="layer" style="top:3072px"></div>
<div class="layer flip" style="top:3584px"></div>

<div class="layer" style="top:4096px"></div>
<div class="layer flip" style="top:4608px"></div>

</body>
</html>
