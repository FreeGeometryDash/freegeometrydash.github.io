<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gra</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* usuwa białe „docięcia” */
}

body {
    width: 100%;
    height: 100%;

    background-image: url("assets/game_bg_01_001.png");
    background-repeat: repeat-x;

    animation: scrollBg 10s linear infinite;
}

@keyframes scrollBg {
    from { background-position: 0 0; }
    to { background-position: -1000px 0; }
}
</style>

/* 🎮 przyciski */
.menu {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    display: flex;
    flex-direction: column;
    gap: 10px;
}

button {
    padding: 12px 30px;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="menu">
    <button onclick="alert('Start!')">Start</button>
    <button>Opcje</button>
    <button>Wyjście</button>
</div>

</body>
</html>
