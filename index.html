<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gra</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow-y: scroll;
    overflow-x: hidden;
}

body {
    background: #5b86cf;
    min-height: 10240px;
}

.layer {
    position: absolute;
    left: 0;
    width: 100%;
    height: 512px;

    background-image: url("assets/game_bg_01_001.png");
    background-repeat: repeat-x;
    background-size: auto 100%;

    animation: scrollBg 10s linear infinite;
}

.flip {
    transform: scaleY(-1);
}

@keyframes scrollBg {
    from { background-position-x: 0; }
    to { background-position-x: -512px; }
}
</style>

</head>
<body>

<script>
const PAIRS = 10; // ← TU zmieniasz liczbę par

for(let i = 0; i < PAIRS * 2; i++) {
    const layer = document.createElement("div");

    layer.className = "layer";
    if(i % 2 === 1) layer.classList.add("flip");

    layer.style.top = (i * 512) + "px";

    document.body.appendChild(layer);
}

document.body.style.minHeight = (PAIRS * 2 * 512) + "px";
</script>

</body>
</html>
